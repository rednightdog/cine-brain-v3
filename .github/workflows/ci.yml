name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect changed files
        id: changed
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi

          CHANGED_FILES="$(
            git diff --name-only "$BASE_SHA" HEAD \
              | grep -E '\.(ts|tsx|js|jsx|mjs|cjs)$' \
              | grep -Ev '^(backups/|scripts/|components/CatalogManager-REFERENCE\.tsx$|.*\.bak.*$|.*\.backup$)' \
              || true
          )"

          {
            echo "files<<EOF"
            echo "$CHANGED_FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Lint changed files
        if: steps.changed.outputs.files != ''
        shell: bash
        run: |
          printf '%s\n' "${{ steps.changed.outputs.files }}" | sed '/^$/d' | xargs npx eslint

      - name: Skip lint (no changed lintable files)
        if: steps.changed.outputs.files == ''
        run: echo "No changed lintable files detected."

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
